/* ===================== events.html ===================== */
<!DOCTYPE html>
<html>
<head><link rel='stylesheet' href='style.css'></head>
<body onload='displayEvents()'>
<div class='navbar'>
  <a href='cart.html'>Cart</a>
  <a onclick='logout()'>Logout</a>
</div>
<div class='container'>
  <div class='card'>
    <h2>Add Event</h2>
    <input id='eventName' placeholder='Name'>
    <input id='eventLocation' placeholder='Location'>
    <input id='eventPrice' placeholder='Price'>
    <button onclick='addEvent()'>Add</button>
  </div>

  <input id='search' placeholder='Search event' onkeyup='searchEvent()'>
  <div id='events'></div>
</div>
<script src='script.js'></script>
</body>
</html>
